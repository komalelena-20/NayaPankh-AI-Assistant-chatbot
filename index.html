<!DOCTYPE html>
<html>
<head>
    <title>NayaPankh AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container chat-container">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h3>🚀 NayaPankh AI Assistant</h3>

            <div>
                <button class="btn btn-light btn-sm" onclick="toggleTheme()">
                    🌙 Dark Mode
                </button>

                <button class="btn btn-danger btn-sm" onclick="clearChat()">
                    🗑️ Clear
                </button>
            </div>

        </div>

        <div class="card-body">

            <div id="chat-box">

                <div class="ai-message">
                    <span>
                        👋 Hello! I'm NayaPankh AI Assistant.
                        Ask me anything about technology, coding, AI, studies, or general knowledge.
                    </span>
                </div>

            </div>

            <div class="input-group mt-3">

                <input
                    type="text"
                    id="userInput"
                    class="form-control"
                    placeholder="Ask anything..."
                >

                <button
                    class="btn btn-primary"
                    onclick="sendMessage()">
                    Send
                </button>

            </div>

        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
